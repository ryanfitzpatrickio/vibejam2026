  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      min-height: 100dvh;
      position: fixed;
      inset: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media (max-width: 900px), (pointer: coarse) {
      #hud { transform: scale(0.55) !important; transform-origin: bottom left !important; }
      #game-toolbar { transform: scale(0.75) !important; transform-origin: top left !important; }
      #round-phase { transform: translateX(-50%) scale(0.75) !important; transform-origin: top center !important; }
      #chase-alert { transform: translateX(-50%) scale(0.75) !important; transform-origin: top center !important; }
      #scoreboard { transform: translateX(-50%) scale(0.8) !important; transform-origin: top center !important; }
      #hero-prompt { transform: translateX(-50%) scale(0.8) !important; transform-origin: center bottom !important; }
    }
    @media (max-width: 520px), (max-height: 760px) {
      #hud { transform: scale(0.42) !important; transform-origin: bottom left !important; }
      #game-toolbar { transform: scale(0.56) !important; transform-origin: top left !important; }
      #round-phase { transform: translateX(-50%) scale(0.56) !important; transform-origin: top center !important; }
      #chase-alert { transform: translateX(-50%) scale(0.56) !important; transform-origin: top center !important; }
      #scoreboard { transform: translateX(-50%) scale(0.62) !important; transform-origin: top center !important; }
      #hero-prompt { transform: translateX(-50%) scale(0.58) !important; transform-origin: center bottom !important; }
    }
    @media (max-width: 380px), (max-height: 680px) {
      #hud { transform: scale(0.34) !important; transform-origin: bottom left !important; }
      #game-toolbar { transform: scale(0.48) !important; transform-origin: top left !important; }
      #round-phase { transform: translateX(-50%) scale(0.48) !important; transform-origin: top center !important; }
      #chase-alert { transform: translateX(-50%) scale(0.48) !important; transform-origin: top center !important; }
      #scoreboard { transform: translateX(-50%) scale(0.54) !important; transform-origin: top center !important; }
      #hero-prompt { transform: translateX(-50%) scale(0.5) !important; transform-origin: center bottom !important; }
    }
  </style>
